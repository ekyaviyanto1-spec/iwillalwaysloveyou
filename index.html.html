<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memories</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
        }

        /* --- Transisi Layar --- */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease-in-out;
            z-index: 10;
        }
        .active {
            opacity: 1 !important;
            pointer-events: auto !important;
        }

        /* --- Layar 1: Loading Memories --- */
        .heart-icon {
            font-size: 50px;
            color: #ff6b8b;
            text-shadow: 0 0 20px rgba(255, 107, 139, 0.8);
            animation: heartbeat 1.5s infinite;
            margin-bottom: 20px;
        }
        .loading-text {
            color: #ff6b8b;
            font-size: 11px;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .loading-dots {
            display: flex;
            gap: 8px;
        }
        .dot {
            width: 6px;
            height: 6px;
            background-color: #ff6b8b;
            border-radius: 50%;
            opacity: 0.3;
            animation: fadeDot 1.5s infinite;
        }
        .dot:nth-child(2) { animation-delay: 0.5s; }
        .dot:nth-child(3) { animation-delay: 1s; }

        /* --- Layar 2: Tap to Start --- */
        .tap-icon {
            width: 40px;
            height: 40px;
            fill: #ff6b8b;
            animation: bounce 1.5s infinite;
            margin-bottom: 15px;
            cursor: pointer;
        }
        .tap-text {
            color: #555;
            font-size: 12px;
            letter-spacing: 4px;
        }

        /* --- Layar 3: Memories Collage --- */
        #memories-screen {
            background-color: #050002;
            z-index: 5;
            position: relative;
        }

        /* Teks Samar di Latar Belakang (Persis seperti Video) */
        .bg-texts {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
        }
        .bg-text {
            position: absolute;
            color: rgba(255, 107, 139, 0.15); /* Warna pink samar */
            font-size: 14px;
            white-space: nowrap;
            font-style: italic;
        }

        /* Container Foto */
        #photo-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 100%;
            z-index: 5;
        }
        
        .photo-wrapper {
            position: absolute;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        .photo-wrapper img {
            width: 130px;
            height: 150px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.9);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Animasi Pop-in untuk Foto */
        .pop-in {
            opacity: 1 !important;
            transform: scale(1) !important;
        }

        /* --- Keyframes --- */
        @keyframes heartbeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.1); }
            28% { transform: scale(1); }
            42% { transform: scale(1.1); }
            70% { transform: scale(1); }
        }
        @keyframes fadeDot {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-15px); }
            60% { transform: translateY(-7px); }
        }
    </style>
</head>
<body>

    <!-- Musik Latar -->
    <audio id="bg-music" loop>
        <source src="musik.mp3" type="audio/mp3">
    </audio>

    <!-- Layar 1: Loading -->
    <div id="loading-screen" class="screen active">
        <div class="heart-icon">🩷</div>
        <div class="loading-text">L O A D I N G &nbsp; M E M O R I E S</div>
        <div class="loading-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <!-- Layar 2: Tap to Start -->
    <div id="start-screen" class="screen" onclick="startMemories()">
        <!-- SVG Ikon Tangan -->
        <svg class="tap-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M9 11.24V7.5C9 6.12 10.12 5 11.5 5S14 6.12 14 7.5v3.74c1.21-.81 3-1.63 4.54.2 1.34 1.59 1.45 3.32.96 5.34l-1.35 5.56C17.65 24 16 24 16 24H8.85c-1.55 0-3.32-1.05-3.85-2.52l-2.06-5.7c-.31-.86.11-1.37.58-1.53.51-.18 1.14-.07 1.62.48L7 17V11.24a2 2 0 0 1 2 0z"/>
        </svg>
        <div class="tap-text">T A P &nbsp; T O &nbsp; S T A R T</div>
    </div>

    <!-- Layar 3: Memories (Latar Teks & Foto) -->
    <div id="memories-screen" class="screen">
        
        <!-- Background Teks Persis Seperti Video -->
        <div class="bg-texts">
            <div class="bg-text" style="top: 10%; left: 5%;">stay with me</div>
            <div class="bg-text" style="top: 15%; right: 10%;">my favorite person</div>
            <div class="bg-text" style="top: 25%; left: 15%;">forever</div>
            <div class="bg-text" style="top: 32%; right: 5%;">I love you</div>
            <div class="bg-text" style="top: 40%; left: 10%;">only you</div>
            <div class="bg-text" style="top: 45%; right: 20%;">thinking of u</div>
            <div class="bg-text" style="top: 55%; left: 5%;">you mean everything</div>
            <div class="bg-text" style="top: 60%; right: 10%;">I miss you</div>
            <div class="bg-text" style="top: 70%; left: 25%;">always with you</div>
            <div class="bg-text" style="top: 80%; right: 5%;">my heart is yours</div>
            <div class="bg-text" style="top: 85%; left: 10%;">love u more</div>
            <div class="bg-text" style="top: 90%; right: 15%;">you are enough</div>
            <div class="bg-text" style="top: 95%; left: 20%;">always on my mind</div>
        </div>

        <!-- Wadah Foto Kolase -->
        <div id="photo-container">
            <!-- Foto akan di-generate via JavaScript -->
        </div>
    </div>

    <script>
        // Transisi Otomatis: Loading -> Tap to Start (3.5 detik)
        setTimeout(() => {
            document.getElementById('loading-screen').classList.remove('active');
            document.getElementById('start-screen').classList.add('active');
        }, 3500);

        // Fungsi Memulai Halaman Utama
        function startMemories() {
            // Putar Musik
            document.getElementById('bg-music').play();
            
            // Pindah Layar
            document.getElementById('start-screen').classList.remove('active');
            document.getElementById('memories-screen').classList.add('active');

            // Data Posisi Foto (Tata Letak Kolase Berantakan Estetik)
            // Sesuaikan nama file dengan yang ada di GitHub kamu (foto1.jpg - foto6.jpg)
            const photosData = [
                { src: 'foto1.jpg', top: '15%', left: '10%', rotate: '-8deg', zIndex: 1 },
                { src: 'foto2.jpg', top: '55%', left: '45%', rotate: '5deg', zIndex: 2 },
                { src: 'foto3.jpg', top: '25%', left: '40%', rotate: '12deg', zIndex: 3 },
                { src: 'foto4.jpg', top: '65%', left: '10%', rotate: '-5deg', zIndex: 4 },
                { src: 'foto5.jpg', top: '40%', left: '5%', rotate: '-10deg', zIndex: 5 },
                { src: 'foto6.jpg', top: '35%', left: '25%', rotate: '0deg', zIndex: 6 } // Foto Utama (Tengah)
            ];

            const container = document.getElementById('photo-container');
            
            // Memunculkan foto satu per satu dengan jeda
            photosData.forEach((data, index) => {
                setTimeout(() => {
                    // Buat pembungkus foto
                    const wrapper = document.createElement('div');
                    wrapper.className = 'photo-wrapper';
                    
                    // Setel posisi dan rotasi
                    wrapper.style.top = data.top;
                    wrapper.style.left = data.left;
                    wrapper.style.transform = `scale(0.5) rotate(${data.rotate})`;
                    wrapper.style.zIndex = data.zIndex;

                    // Masukkan gambar
                    const img = document.createElement('img');
                    img.src = data.src;
                    
                    wrapper.appendChild(img);
                    container.appendChild(wrapper);

                    // Beri sedikit jeda agar CSS transition (efek pop-in) bekerja
                    setTimeout(() => {
                        wrapper.style.transform = `scale(1) rotate(${data.rotate})`;
                        wrapper.classList.add('pop-in');
                    }, 50);

                }, index * 1200); // Setiap foto muncul berurutan dengan jeda 1.2 detik
            });
        }
    </script>
</body>
</html>
