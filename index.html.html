<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
            -webkit-user-select: none;
        }

        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease-in-out;
            z-index: 10;
        }

        .active {
            opacity: 1 !important;
            pointer-events: auto !important;
        }

        /* --- LAYAR 1: LOADING MEMORIES --- */
        .heart-glow {
            width: 60px;
            height: 60px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ff4d88"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>') no-repeat center;
            filter: drop-shadow(0 0 15px rgba(255, 77, 136, 0.6));
            animation: heartbeat 1.5s infinite;
            margin-bottom: 25px;
        }
        .loading-text {
            letter-spacing: 6px;
            font-size: 11px;
            color: #999;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        .loading-dots {
            display: flex;
            gap: 8px;
            justify-content: center;
            align-items: center;
        }
        .loading-dots span {
            width: 6px;
            height: 6px;
            background-color: #ff4d88;
            border-radius: 50%;
            opacity: 0.3;
            animation: dotFade 1.4s infinite;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

        /* --- LAYAR 2: TAP TO START --- */
        .tap-icon {
            width: 40px;
            height: 40px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ff4d88"><path d="M9 11.24V7.5C9 6.12 10.12 5 11.5 5S14 6.12 14 7.5v3.74c1.21-.81 2-2.18 2-3.74C16 5.01 13.99 3 11.5 3S7 5.01 7 7.5c0 1.56.79 2.93 2 3.74zm9.84 4.63l-4.54-2.26c-.17-.07-.35-.11-.54-.11H13v-6c0-.83-.67-1.5-1.5-1.5S10 6.67 10 7.5v10.74l-3.43-.72c-.08-.01-.15-.03-.24-.03-.31 0-.59.13-.79.33l-.79.8 4.94 4.94c.27.27.65.44 1.04.44h6.79c.75 0 1.33-.55 1.44-1.28l.75-5.27c.01-.07.02-.14.02-.21 0-.69-.47-1.28-1.14-1.42z"/></svg>') no-repeat center;
            filter: drop-shadow(0 0 10px rgba(255, 77, 136, 0.4));
            animation: bounce 1.5s infinite;
            cursor: pointer;
            margin-bottom: 20px;
        }

        /* --- LAYAR 3: MEMORIES --- */
        #memories-screen {
            background-color: #050505;
            z-index: 5;
        }

        /* Dinding Teks (Wall of Text) Persis Seperti Video */
        .bg-text-wall {
            position: absolute;
            top: -10%; left: -50%; width: 200%; height: 120%;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            z-index: 1;
            opacity: 0.35; /* Tingkat kesamaran teks */
            pointer-events: none;
        }
        .text-row {
            color: #3b1c2b; /* Warna ungu/pink sangat gelap */
            font-size: 18px;
            font-weight: 600;
            white-space: nowrap;
            letter-spacing: 2px;
            animation: scrollText 30s linear infinite;
        }
        .text-row:nth-child(even) {
            animation: scrollTextReverse 35s linear infinite;
        }

        /* Container Foto Menumpuk di Tengah */
        #photo-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 160px; /* Ukuran dasar foto di HP */
            height: 220px;
            z-index: 2;
        }
        .photo {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.9);
            opacity: 0;
            transform: scale(0.8);
            /* Transisi pop-up cepat khas template capcut */
            transition: opacity 0.3s ease-out, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .photo.show {
            opacity: 1;
        }

        /* --- KEYFRAMES --- */
        @keyframes heartbeat {
            0%, 100% { transform: scale(0.95); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 25px rgba(255, 77, 136, 0.8)); }
        }
        @keyframes dotFade {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; box-shadow: 0 0 8px #ff4d88; }
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes scrollText {
            0% { transform: translateX(0); }
            100% { transform: translateX(-20%); }
        }
        @keyframes scrollTextReverse {
            0% { transform: translateX(-20%); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <audio id="bg-music">
        <source src="musik.mp3" type="audio/mp3">
    </audio>

    <!-- Layar 1 -->
    <div id="loading-screen" class="screen active">
        <div class="heart-glow"></div>
        <div class="loading-text">L O A D I N G &nbsp; M E M O R I E S</div>
        <div class="loading-dots">
            <span></span><span></span><span></span>
        </div>
    </div>

    <!-- Layar 2 -->
    <div id="start-screen" class="screen" onclick="startMemories()">
        <div class="tap-icon"></div>
        <div class="loading-text" style="color: #666;">T A P &nbsp; T O &nbsp; S T A R T</div>
    </div>

    <!-- Layar 3 -->
    <div id="memories-screen" class="screen">
        <!-- Dinding Teks Background -->
        <div class="bg-text-wall" id="text-wall"></div>
        <!-- Wadah Tumpukan Foto di Tengah -->
        <div id="photo-container"></div>
    </div>

    <script>
        // 1. Pindah otomatis dari Loading ke Tap to Start (durasi 3 detik)
        setTimeout(() => {
            document.getElementById('loading-screen').classList.remove('active');
            document.getElementById('start-screen').classList.add('active');
        }, 3000);

        // 2. Klik Tap To Start
        function startMemories() {
            const music = document.getElementById('bg-music');
            music.play().catch(e => console.log(e));

            document.getElementById('start-screen').classList.remove('active');
            document.getElementById('memories-screen').classList.add('active');

            buildTextWall();
            showPhotos();
        }

        // 3. Membangun background text seperti di video
        function buildTextWall() {
            const wall = document.getElementById('text-wall');
            const pattern = "stay with me • my favorite person • forever • always with you • only you • thinking of u • you mean everything • I miss you • always on my mind • you are enough • my heart is yours • love u more • ";
            
            // Membuat 15 baris teks agar layar hitam penuh
            for(let i = 0; i < 15; i++) {
                const row = document.createElement('div');
                row.className = 'text-row';
                // Mengulang pattern agar cukup panjang untuk digeser (scrolling)
                row.innerText = pattern.repeat(6); 
                wall.appendChild(row);
            }
        }

        // 4. Memunculkan foto menumpuk di tengah dengan pop-up halus
        function showPhotos() {
            const container = document.getElementById('photo-container');
            const totalPhotos = 7; // Pastikan ada 7 foto (foto1.jpg s/d foto7.jpg) di GitHub
            
            for(let i = 1; i <= totalPhotos; i++) {
                setTimeout(() => {
                    const img = document.createElement('img');
                    img.src = `foto${i}.jpg`;
                    img.className = 'photo';
                    img.style.zIndex = i + 10;
                    
                    // Rotasi acak (-12 derajat hingga +12 derajat) dan posisi geser sedikit
                    const randomRotation = (Math.random() * 24) - 12;
                    const offsetX = (Math.random() * 20) - 10;
                    const offsetY = (Math.random() * 20) - 10;
                    
                    container.appendChild(img);
                    
                    // Trigger animasi pop-up (scale 0.8 ke 1) 
                    setTimeout(() => {
                        img.classList.add('show');
                        img.style.transform = `scale(1) translate(${offsetX}px, ${offsetY}px) rotate(${randomRotation}deg)`;
                    }, 50);

                }, (i - 1) * 1400); // Jarak antar foto: 1.4 detik (sesuaikan jika perlu)
            }
        }
    </script>
</body>
</html>
